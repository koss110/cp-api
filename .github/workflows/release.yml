name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to deploy (skips build). Example: v1.2.3"
        required: true
        type: string
      open_pr:
        description: "Open PR from infra main to production"
        required: false
        type: boolean
        default: true

env:
  AWS_REGION: us-east-2
  ECR_REPO: exam-costa-api

jobs:
  release:
    name: Build, Push & Update Infra
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Build + Push (only on tag push, not on workflow_dispatch) ----
      - name: Login to Amazon ECR
        id: ecr-login
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: github.event_name == 'push'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build \
            --build-arg VERSION=$IMAGE_TAG \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=${{ github.sha }} \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set image tag for dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "IMAGE_TAG=${{ inputs.image_tag }}" >> $GITHUB_ENV

      # ---- Update infra repo image_tags.staging.tfvars ----
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra
          ref: main

      - name: Update api_image_tag in staging and production tfvars
        run: |
          sed -i "s|^api_image_tag.*=.*|api_image_tag    = \"$IMAGE_TAG\"|" \
            infra/iac/terraform/envs/eus2/image_tags.staging.tfvars
          sed -i "s|^api_image_tag.*=.*|api_image_tag    = \"$IMAGE_TAG\"|" \
            infra/iac/terraform/envs/eus2/image_tags.production.tfvars

      - name: Commit and push image tag update
        run: |
          cd infra
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iac/terraform/envs/eus2/image_tags.staging.tfvars \
                  iac/terraform/envs/eus2/image_tags.production.tfvars
          git commit -m "chore: update api_image_tag to $IMAGE_TAG" || echo "Nothing to commit"
          git push origin main

      # ---- Open or update PR infra main → production ----
      - name: Open or update PR infra main to production
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.open_pr == true)
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          GH_REPO: ${{ secrets.INFRA_REPO }}
        run: |
          cd infra
          PR_TITLE="deploy: promote api $IMAGE_TAG to production"
          PR_BODY="## Promote api image tag \`$IMAGE_TAG\` to production

          Triggered by: ${{ github.event_name }}
          Service: cp-api
          Image tag: \`$IMAGE_TAG\`
          Commit: ${{ github.sha }}

          **Merge this PR to deploy to production.**"

          EXISTING_PR=$(gh pr list \
            --repo "$GH_REPO" \
            --base production \
            --head main \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR with new tag $IMAGE_TAG"
            gh pr edit "$EXISTING_PR" \
              --repo "$GH_REPO" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          else
            gh pr create \
              --repo "$GH_REPO" \
              --base production \
              --head main \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          fi

      # ---- Create GitHub Release ----
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${IMAGE_TAG}"
          gh release create "${IMAGE_TAG}" \
            --title "Release ${IMAGE_TAG}" \
            --generate-notes \
            --notes "## Docker Image

          | | |
          |---|---|
          | **ECR image** | \`${IMAGE_URI}\` |
          | **Commit** | \`${{ github.sha }}\` |
          "

      - name: Report workflow status to CloudWatch
        if: always()
        uses: aws-actions/action-cloudwatch-metrics@main
        with:
          namespace: GitHub/Actions
          metric-name: WorkflowRun
          metric-dimensions: >-
            [{"Name":"Repository","Value":"${{ github.repository }}"},{"Name":"Workflow","Value":"${{ github.workflow }}"}]
