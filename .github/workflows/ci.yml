name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ruff==0.4.9

      - name: Run ruff
        run: ruff check app/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --ignore=tests/integration \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Generate coverage report
        if: always()
        run: |
          python - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse('coverage.xml').getroot()
              rate = float(root.get('line-rate', 0)) * 100
              lines = [
                  '## Test Coverage',
                  '',
                  f'**Total: {rate:.1f}%**',
                  '',
                  '| File | Coverage |',
                  '|------|----------|',
              ]
              for cls in root.findall('.//class'):
                  name = cls.get('filename', cls.get('name', ''))
                  r = float(cls.get('line-rate', 0)) * 100
                  lines.append(f'| `{name}` | {r:.1f}% |')
              content = '\n'.join(lines) + '\n'
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write(content)
              with open('coverage-summary.md', 'w') as f:
                  f.write(content)
          except Exception as e:
              print(f'Coverage summary skipped: {e}', file=sys.stderr)
          PYEOF

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coverage-summary.md

  integration-test:
    name: Integration Tests (LocalStack)
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: sqs,s3,ssm
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test  # pragma: allowlist secret
          AWS_SECRET_ACCESS_KEY: test  # pragma: allowlist secret
          AWS_REGION: us-east-2
        run: pytest tests/integration/ -v --tb=short

      - name: Configure AWS credentials
        if: always() && github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Report workflow status to CloudWatch
        if: always() && github.actor != 'dependabot[bot]'
        uses: aws-actions/action-cloudwatch-metrics@main
        with:
          namespace: GitHub/Actions
          metric-name: WorkflowRun
          metric-dimensions: >-
            [{"Name":"Repository","Value":"${{ github.repository }}"},{"Name":"Workflow","Value":"${{ github.workflow }}"}]
